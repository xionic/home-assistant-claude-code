<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Claude Code UI</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <span class="title">Claude Code UI</span>
        <span id="status-dot" class="status-dot"></span>
      </div>
      <div class="header-right">
        <select id="perm-mode" class="perm-mode-select" title="Permission mode">
          <option value="ask">Ask</option>
          <option value="auto">Auto</option>
          <option value="acceptEdits">Accept edits</option>
          <option value="bypass">Bypass</option>
        </select>
        <button id="settings-btn" class="icon-btn" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
          </svg>
        </button>
        <button id="new-session-btn" class="icon-btn" title="New chat" aria-label="New chat">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/>
          </svg>
        </button>
      </div>
    </header>

    <div id="settings-panel" class="settings-panel hidden">
      <div class="settings-row">
        <label for="model-select">Model</label>
        <select id="model-select" class="settings-select">
          <option value="">Default</option>
          <option value="claude-opus-4-8">Opus 4.8</option>
          <option value="claude-sonnet-4-6">Sonnet 4.6</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5</option>
        </select>
      </div>
    </div>

    <div id="login-screen" class="login-screen hidden">
      <div class="login-card">
        <div class="login-logo">&#x1F916;</div>
        <h2 class="login-title">Connect to Anthropic</h2>
        <p class="login-desc">Sign in to your Anthropic account to use Claude.</p>
        <button id="login-btn" class="btn btn-allow login-action-btn">Sign in with Anthropic</button>
        <div id="login-url-section" class="login-url-section hidden">
          <p class="login-url-label">Open this link in your browser to sign in:</p>
          <a id="login-url" href="#" target="_blank" rel="noopener" class="login-url-link">Loading…</a>
        </div>
        <form id="login-code-form" class="login-code-form hidden">
          <p class="login-url-label">Paste the code from the browser:</p>
          <div class="login-code-row">
            <input id="login-code-input" class="login-code-input" type="text"
              placeholder="Paste code here" autocomplete="off" spellcheck="false">
            <button type="submit" class="btn btn-allow">Submit</button>
          </div>
        </form>
        <p id="login-waiting" class="login-waiting hidden">Waiting for authentication&#8230;</p>
      </div>
    </div>

    <div id="messages" class="messages"></div>

    <div id="permission-overlay" class="permission-overlay hidden">
      <div class="permission-card">
        <div id="perm-header" class="perm-header">
          <span id="perm-tool-chip" class="perm-tool-chip"></span>
          <h3 id="perm-title" class="perm-title">Allow tool use?</h3>
        </div>
        <pre id="perm-input" class="perm-input"></pre>
        <div class="perm-buttons">
          <button id="perm-deny" class="btn btn-deny">Deny</button>
          <button id="perm-allow" class="btn btn-allow">Allow</button>
        </div>
      </div>
    </div>

    <form id="input-form" class="input-form">
      <div id="cmd-menu" class="cmd-menu hidden"></div>
      <textarea
        id="prompt-input"
        class="prompt-input"
        placeholder="Ask Claude… (Ctrl+Enter to send)"
        rows="1"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="sentences"
        spellcheck="false"
      ></textarea>
      <button type="submit" id="send-btn" class="send-btn" disabled aria-label="Send">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </form>
  </div>
  <script src="app.js"></script>
</body>
</html>
