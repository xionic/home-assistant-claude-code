name: "Claude Code UI"
version: "1.1.0"
slug: "claude-code-ui"
description: "Claude Code in your browser with Home Assistant integration and mobile-friendly chat UI."
url: "https://github.com/xionic/home-assistant-claude-code"
arch:
  - aarch64
  - amd64
startup: services
boot: manual
ingress: true
ingress_port: 7681
panel_icon: mdi:creation
homeassistant_api: true
auth_api: true
hassio_api: true
hassio_role: manager
map:
  - config:rw
options:
  anthropic_api_key: ""
  default_permission_mode: ask
  ha_smart_context: true
  debug: false
schema:
  anthropic_api_key: str?
  default_permission_mode: "list(ask|auto|acceptEdits|bypass)"
  ha_smart_context: bool
  debug: bool
