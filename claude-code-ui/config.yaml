name: "Claude Code UI"
version: "2.5.0"
slug: "claude-code-ui"
description: "Claude Code in your browser with Home Assistant integration and mobile-friendly chat UI."
url: "https://github.com/xionic/home-assistant-claude-code"
arch:
  - aarch64
  - amd64
startup: services
boot: manual
ingress: true
ingress_port: 7681
panel_icon: mdi:creation
homeassistant_api: true
auth_api: true
hassio_api: true
hassio_role: manager
map:
  - config:rw
options:
  anthropic_api_key: ""
  ha_token: ""
  ha_smart_context: true
  enable_ha_mcp: false
  bypass_permissions: false
  debug: false
  persistent_apk_packages: []
  persistent_pip_packages: []
schema:
  anthropic_api_key: str
  ha_token: str
  ha_smart_context: bool
  enable_ha_mcp: bool
  bypass_permissions: bool
  debug: bool
  persistent_apk_packages:
    - str
  persistent_pip_packages:
    - str
